    <title>Primeira API</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="conteiner">

        <h4>Endpoint ➡️ /localhost/primeira-api/hello</h4>
        <h4>Método 😮 GET</h4>

        <div id="resposta" class="resposta">

        </div>

    </div>
